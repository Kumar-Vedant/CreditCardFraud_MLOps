name: CI/CD Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Stop existing containers
        run: docker compose down

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Cleanup unused images
        run: docker image prune -f
